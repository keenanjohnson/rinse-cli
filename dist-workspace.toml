[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app (Homebrew only)
installers = ["homebrew"]
# Homebrew tap (a homebrew-<name> repo) to publish the generated formula to.
tap = "keenanjohnson/homebrew-tap"
# Publish the Homebrew formula automatically on release.
publish-jobs = ["homebrew"]
# Target platforms to build apps for (Rust target-triple syntax).
# Windows is omitted: ffplay pipe behavior there is unverified (see CLAUDE.md).
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]

# rinsefm needs ffmpeg/ffplay at runtime; declare it as a run-stage dependency so
# the generated Homebrew formula gets `depends_on "ffmpeg"` and installs it.
[dist.dependencies.homebrew]
ffmpeg = { version = "*", stage = ["run"] }
